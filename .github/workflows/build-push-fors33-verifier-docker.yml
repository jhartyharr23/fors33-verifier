# Build fors33-verifier Docker image and push to GHCR and Docker Hub.
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (for Docker Hub push).

name: Build and push fors33-verifier Docker image

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  IMAGE_GHCR: ghcr.io
  IMAGE_DH: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version and tags
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=latest
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        if: github.repository_owner != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/fors33/fors33-verifier:${{ steps.meta.outputs.version }}
            ghcr.io/fors33/fors33-verifier:latest
            docker.io/fors33/fors33-verifier:${{ steps.meta.outputs.version }}
            docker.io/fors33/fors33-verifier:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
