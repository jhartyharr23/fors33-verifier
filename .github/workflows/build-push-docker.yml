# Build and push fors33-verifier image to GHCR and Docker Hub.
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

name: Build and push Docker image

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set version and tags
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=latest
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "ghcr_image=ghcr.io/${{ github.repository_owner }}/fors33-verifier:$VERSION" >> $GITHUB_OUTPUT
          echo "dh_image=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/verifier:$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.ghcr_image }}
            ghcr.io/${{ github.repository_owner }}/fors33-verifier:latest
            ${{ steps.meta.outputs.dh_image }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/verifier:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
